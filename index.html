<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Noto+Serif:ital,wght@0,100..900;1,100..900&family=Pirata+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <h1>ILLCIT ARTS</h1>

           
            
            <div class="hamburger">
                <span class="ham-line line-1"></span>
                <span class="ham-line line-2"></span>
                <span class="ham-line line-3"></span>
            </div>
        </nav>

        <div class="nav-menu">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </div>
    </header>

    <main>
        <div id="hero">
            <div class="hero-video">
                <video src="assets/illcitvideo-short.mp4" autoplay loop muted playinline preload="">
                    <source src="hero-mp4" type="video/mp4">
                </video>
            </div>

            <div class="hero-container">
                <h1>ILLCIT ARTS STUDIO TX</h1>

                <p>9934 Jones Rd Ste B3 Houston</p>
            </div>
        </div>

        <div class="hero-info">
            <div class="hero-wrapper">
                <div class="hero-cell cell-wide">
                    <div class="hero-btns">
                        <button class="btn-var1">
                            <span>MEET ARTISTS</span>

                            <img src="assets/btn-aroow.png" alt="">
                        </button>

                        <button class="btn-var1">
                            <span>Book Your Session</span>

                            <img src="assets/btn-aroow.png" alt="">
                        </button>
                    </div>
                </div>

                <div class="hero-cell">
                    <h2>Location</h2>

                    <p>9934 Jones Rd Ste B3 Houston, TX 77065</p>
                </div>

                <div class="hero-cell">
                    <h2>Hours</h2>

                    <ul>
                        <li>Mon - Thur 2PM To 10Pm</li>
                        <li>Fri - Sat 2PM To 10Pm</li>
                        <li>Sun Closed</li>
                    </ul>
                </div> 
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/split-type"></script>
    <script src="script.js"></script>
</body>
</html>
